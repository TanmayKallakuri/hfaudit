id: HFA-PKL-010
severity: low
category: pickle.import.unusual_global
description: "Pickle references a global/import not in the standard ML library allowlist"
allowlist_modules:
  - "torch"
  - "torch._utils"
  - "torch.nn"
  - "torch.nn.modules"
  - "torch.nn.parameter"
  - "torch.storage"
  - "torch._C"
  - "numpy"
  - "numpy.core"
  - "numpy.core.multiarray"
  - "numpy.dtype"
  - "collections"
  - "collections.abc"
  - "_codecs"
  - "codecs"
  - "copy_reg"
  - "copyreg"
  - "_collections_abc"
  - "builtins"
  - "sklearn"
  - "scipy"
  - "pandas"
  - "transformers"
  - "safetensors"
  - "_pickle"
  - "pickle"
  - "functools"
  - "operator"
  - "itertools"
  - "abc"
  - "enum"
  - "typing"
  - "types"
  - "re"
  - "math"
  - "numbers"
  - "decimal"
  - "fractions"
  - "datetime"
  - "io"
  - "struct"
  - "array"
  - "json"
  - "pathlib"
  - "dataclasses"
  - "pydantic"
references:
  - "https://docs.python.org/3/library/pickle.html#restricting-globals"
false_positive_notes: "Many legitimate models use domain-specific libraries (detectron2, mmdet, fairseq) that are not in the allowlist. This rule should be tuned per scan context. Low severity by design."
bypass_notes: "Attacker can use allowlisted modules as a trampoline (e.g., functools.reduce) or disguise imports via __import__ which appears as a builtins reference."
